  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function Login({ onEnter }) {
      const [name, setName] = useState("");
      return (
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", minHeight: "100vh", background: "var(--background)" }}>
          <div style={{ background: "var(--surface)", padding: 32, borderRadius: 12, border: "1px solid var(--border)", width: "100%", maxWidth: 400, textAlign: "center" }}>
            <h2 style={{ marginBottom: 16 }}>Welcome to Lightex</h2>
            <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Enter your name" style={{ width: "100%", padding: 12, borderRadius: 6, border: "1px solid var(--border)", fontSize: 14, boxSizing: "border-box" }} />
            <button onClick={() => name.trim() && onEnter(name.trim())} style={{ width: "100%", padding: 12, background: "var(--primary)", color: "#fff", border: "none", borderRadius: 6, fontWeight: "bold", cursor: "pointer", marginTop: 16 }}>Enter</button>
          </div>
        </div>
      );
    }

    function Layout({ userName, theme, setTheme }) {
      return (
        <div className="app-container">
          <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 24px", background: "var(--surface)", borderBottom: "1px solid var(--border)" }}>
            <div>
              <span style={{ fontSize: 20, fontWeight: "bold" }}>lightex</span>
              <span style={{ fontSize: 12, color: "var(--text-muted)", marginLeft: 8 }}>SNAG MANAGEMENT</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
              <span>Hi, {userName}</span>
              <button onClick={() => setTheme(theme === "light" ? "dark" : "light")} style={{ padding: "6px 12px", borderRadius: 6, border: "1px solid var(--border)", cursor: "pointer" }}>
                {theme === "light" ? "🌙 Dark" : "☀️ Light"}
              </button>
            </div>
          </header>
          <main style={{ padding: 24, flex: 1 }}>
            <h3>PROJECTS (0)</h3>
            <p style={{ color: "var(--text-muted)", marginTop: 16 }}>No projects yet.</p>
          </main>
        </div>
      );
    }

    function App() {
      const [userName, setUserName] = useState(() => localStorage.getItem("lx-user") || "");
      const [theme, setTheme] = useState(() => localStorage.getItem("lx-theme") || "light");
      const [db, setDb] = useState(() => {
        const saved = localStorage.getItem("snagdata");
        return saved ? JSON.parse(saved) : { projects: [] };
      });

      useEffect(() => {
        localStorage.setItem("lx-user", userName);
      }, [userName]);

      useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("lx-theme", theme);
      }, [theme]);

      if (!userName) {
        return <Login onEnter={setUserName} />;
      }

      return (
        <Layout userName={userName} theme={theme} setTheme={setTheme} />
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
