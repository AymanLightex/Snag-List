<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LIGHTEX — Snag Management</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --coral:#E8614A;--coral-light:#F07A65;--coral-dark:#C94F3A;
  --gray:#808080;--gray-light:#A0A0A0;--gray-dark:#606060;
  --bg:#070f1c;--surface:#0F1B2D;--surface2:#0a1628;--border:#1E3A5F;
  --text:#E8EDF2;--text-muted:#64748b;--text-sub:#94a3b8;
  --status-open-c:#F5A623;--status-open-bg:#2a1f00;
  --status-ip-c:#3B9EFF;--status-ip-bg:#001a33;
  --status-pend-c:#A78BFA;--status-pend-bg:#1a0033;
  --status-res-c:#34D399;--status-res-bg:#00331a;
  --status-rej-c:#F87171;--status-rej-bg:#330000;
  --status-cl-c:#9CA3AF;--status-cl-bg:#1a1a1a;
  --pri-crit:#F87171;--pri-high:#F5A623;--pri-med:#3B9EFF;--pri-low:#34D399;
  --radius:10px;--radius-sm:7px;--radius-lg:14px;
  --shadow:0 8px 40px rgba(0,0,0,0.5);
  --transition:0.15s ease;
}
[data-theme="light"]{
  --bg:#f0f2f5;--surface:#ffffff;--surface2:#f7f8fa;--border:#e2e8f0;
  --text:#1a2332;--text-muted:#64748b;--text-sub:#4a5568;
  --status-open-bg:#fff8e7;--status-ip-bg:#e6f0ff;
  --status-pend-bg:#f3eeff;--status-res-bg:#e6fff5;
  --status-rej-bg:#fff0f0;--status-cl-bg:#f5f5f5;
}
[data-theme="light"] select option{background:#fff;color:#1a2332;}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;height:100vh;overflow:hidden;transition:background var(--transition),color var(--transition);}
#root{height:100vh;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
select option{background:var(--surface2);color:var(--text);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.fade-in{animation:fadeIn 0.2s ease both;}
@media(max-width:480px){
  .snag-card-meta{flex-wrap:wrap;gap:6px!important;}
  .stats-row{gap:6px!important;}
  .stat-card{min-width:60px!important;padding:8px 10px!important;}
  .stat-card .stat-val{font-size:18px!important;}
  .filter-bar{flex-wrap:wrap;}
  .sidebar-wrap{display:none!important;}
}
@media(max-width:720px){
  .project-header-meta{flex-direction:column!important;gap:6px!important;}
  .hide-mobile{display:none!important;}
}
</style>
</head>
<body data-theme="dark">
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Icons ───────────────────────────────────────────────────────────────────
const Icon = ({ d, size=16, color="currentColor", fill="none" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}><path d={d}/></svg>
);
const IC = {

  sun:        "M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 5a7 7 0 100 14A7 7 0 0012 5z",

  paperclip:  "M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48",
  download:   "M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3",
  eye:        "M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 100 6 3 3 0 000-6z",
  brand:      "M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82zM7 7h.01",
  search:     "M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z",
  chevron:    "M9 18l6-6-6-6",
  grid:       "M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z",
};

// ─── Config ──────────────────────────────────────────────────────────────────
const STATUS = {
  open:          { label:"Open",        color:"var(--status-open-c)", bg:"var(--status-open-bg)" },
  "in-progress": { label:"In Progress", color:"var(--status-ip-c)",   bg:"var(--status-ip-bg)"   },
  pending:       { label:"Pending",     color:"var(--status-pend-c)", bg:"var(--status-pend-bg)" },
  resolved:      { label:"Resolved",    color:"var(--status-res-c)",  bg:"var(--status-res-bg)"  },
  rejected:      { label:"Rejected",    color:"var(--status-rej-c)",  bg:"var(--status-rej-bg)"  },
  closed:        { label:"Closed",      color:"var(--status-cl-c)",   bg:"var(--status-cl-bg)"   },
};
const PRIORITY = {
  critical: { label:"Critical", color:"var(--pri-crit)" },
  high:     { label:"High",     color:"var(--pri-high)" },
  medium:   { label:"Medium",   color:"var(--pri-med)"  },
  low:      { label:"Low",      color:"var(--pri-low)"  },
};
const CATEGORY = {
  delivery:"Delivery Issue",quality:"Quality Issue",shortage:"Shortage",
  damage:"Damage",installation:"Installation",payment:"Payment",warranty:"Warranty",other:"Other",
};

const FB_URL   = "https://lightex-snag-default-rtdb.firebaseio.com";
const DB_PATH  = "/snagdata.json";
const uid      = () => Math.random().toString(36).slice(2,9);
const today    = () => new Date().toISOString().split("T")[0];
const fmt      = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";

const FILE_ICONS = { pdf:"📄", doc:"📝", docx:"📝", xls:"📊", xlsx:"📊", ppt:"📑", pptx:"📑", jpg:"🖼", jpeg:"🖼", png:"🖼", gif:"🖼", webp:"🖼", mp4:"🎬", default:"📎" };
const getFileIcon = name => { const ext=(name||"").split(".").pop().toLowerCase(); return FILE_ICONS[ext]||FILE_ICONS.default; };
const isImage = name => ["jpg","jpeg","png","gif","webp"].includes((name||"").split(".").pop().toLowerCase());
const formatSize = bytes => bytes<1024?""+bytes+"B":bytes<1048576?(bytes/1024).toFixed(1)+"KB":(bytes/1048576).toFixed(1)+"MB";

const fbGet = async () => { try { const r=await fetch(FB_URL+DB_PATH); if(!r.ok)return null; return await r.json(); }catch{return null;} };
const fbSet = async (data) => { try { await fetch(FB_URL+DB_PATH,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)}); }catch{} };

const SAMPLE = {
  projects:[
    { id:"p1", name:"Seef Boulevard Tower A", client:"Al Noor Contracting", location:"Seef District, Bahrain",
      contractValue:"BD 45,000", startDate:"2024-01-15", endDate:"2024-12-31",
      contactName:"Eng. Khalid Al-Mansoori", contactPhone:"+973 3300 1234",
      contactEmail:"k.mansoori@alnoor.bh", notes:"LED ground fittings + corridor lighting",
      snags:[
        { id:"s1", ref:"SNL-001", title:"10x LED Ground Fittings — Wrong IP Rating",
          category:"quality", priority:"critical", status:"in-progress",
          location:"Basement Level B2", brand:"Osram",
          description:"Client claims IP65 specified but units are IP44. 10 fittings affected.",
          reportedBy:"Eng. Khalid", reportedDate:"2024-03-10", dueDate:"2024-03-25", amount:"BD 1,200",
          attachments:[], updates:[
            {id:"u1",date:"2024-03-10",by:"Ayman",text:"Issue reported. Visited site, confirmed discrepancy."},
            {id:"u2",date:"2024-03-14",by:"Ayman",text:"Factory confirmed error. Replacements arranged. ETA 10 days."},
            {id:"u3",date:"2024-03-18",by:"Eng. Khalid",text:"Client accepted timeline. Requested written confirmation."},
          ]},
        { id:"s2", ref:"SNL-002", title:"Shortage — 5 Corridor Panels Missing",
          category:"shortage", priority:"high", status:"resolved",
          location:"Floor 3 Corridor", brand:"Philips",
          description:"PO included 40 panels, only 35 delivered.",
          reportedBy:"Site Supervisor", reportedDate:"2024-02-20", dueDate:"2024-03-01", amount:"BD 375",
          attachments:[], updates:[
            {id:"u4",date:"2024-02-20",by:"Ayman",text:"Shortage on delivery day. 5 units held back due to packing error."},
            {id:"u5",date:"2024-02-28",by:"Ayman",text:"5 panels delivered. Client signed updated delivery note."},
          ]},
      ]},
    { id:"p2", name:"Bahrain Bay Office Complex", client:"GulfBuild WLL", location:"Bahrain Bay",
      contractValue:"BD 92,500", startDate:"2024-04-01", endDate:"2025-03-31",
      contactName:"Mr. Tariq Hassan", contactPhone:"+973 3900 5678",
      contactEmail:"tariq@gulfbuild.bh", notes:"Full office lighting — 8 floors", snags:[] }
  ]
};

// ─── Base UI Components ───────────────────────────────────────────────────────
function Badge({ status }) {
  const s = STATUS[status] || STATUS.open;
  return <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,color:s.color,background:s.bg,border:`1px solid ${s.color}40`,textTransform:"uppercase",fontFamily:"monospace",whiteSpace:"nowrap",letterSpacing:"0.04em"}}>{s.label}</span>;
}
function PriDot({ priority }) {
  const p = PRIORITY[priority] || PRIORITY.medium;
  return <span style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:p.color,fontWeight:700}}>
    <span style={{width:7,height:7,borderRadius:"50%",background:p.color,display:"inline-block",flexShrink:0}}/>
    {p.label}
  </span>;
}
function Btn({ children, onClick, variant="primary", small, icon, disabled, style:extraStyle={} }) {
  const styles = {
    primary:   { background:"var(--coral)",    color:"#fff",           border:"none" },
    secondary: { background:"var(--surface2)", color:"var(--text)",    border:"1px solid var(--border)" },
    danger:    { background:"rgba(248,113,113,0.1)", color:"#F87171",  border:"1px solid rgba(248,113,113,0.3)" },
    ghost:     { background:"transparent",     color:"var(--text-sub)",border:"1px solid var(--border)" },
    success:   { background:"rgba(52,211,153,0.12)", color:"#34D399", border:"1px solid rgba(52,211,153,0.3)" },
  };
  const v = styles[variant] || styles.primary;
  return <button onClick={onClick} disabled={disabled} style={{...v,borderRadius:var_radius_sm(),padding:small?"6px 14px":"9px 18px",fontSize:small?12:13,fontWeight:700,cursor:disabled?"not-allowed":"pointer",display:"inline-flex",alignItems:"center",gap:6,opacity:disabled?0.5:1,fontFamily:"inherit",flexShrink:0,transition:"opacity 0.15s, transform 0.1s",...extraStyle}}
    onMouseEnter={e=>{if(!disabled)e.currentTarget.style.opacity="0.85";}}
    onMouseLeave={e=>{if(!disabled)e.currentTarget.style.opacity="1";}}>
    {icon&&<Icon d={IC[icon]} size={small?13:15}/>}{children}
  </button>;
}
function var_radius_sm(){ return "7px"; }

function Field({ label, value, onChange, type="text", placeholder, required, options, rows, hint }) {
  const base = {width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"9px 13px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit",resize:rows?"vertical":"none",transition:"border-color 0.15s"};
  const focus = e => { e.target.style.borderColor="var(--coral)"; };
  const blur  = e => { e.target.style.borderColor="var(--border)"; };
  return <div style={{marginBottom:13}}>
    <label style={{display:"block",fontSize:11,color:"var(--text-muted)",marginBottom:5,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase"}}>
      {label}{required&&<span style={{color:"var(--coral)"}}> *</span>}
    </label>
    {options
      ? <select value={value} onChange={e=>onChange(e.target.value)} style={{...base,appearance:"none"}} onFocus={focus} onBlur={blur}>
          {options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
      : rows
        ? <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={base} onFocus={focus} onBlur={blur}/>
        : <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={base} onFocus={focus} onBlur={blur}/>
    }
    {hint&&<div style={{fontSize:11,color:"var(--text-muted)",marginTop:4}}>{hint}</div>}
  </div>;
}

// ─── File Attachment Components ───────────────────────────────────────────────
function FileAttachZone({ attachments=[], onAdd, onRemove }) {
  const fileRef = useRef();
  const [dragging, setDragging] = useState(false);
  const [previewing, setPreviewing] = useState(null);

  const handleFiles = (files) => {
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        onAdd({ id:uid(), name:file.name, size:file.size, type:file.type, dataUrl:ev.target.result });
      };
      reader.readAsDataURL(file);
    });
  };
  const onDrop = e => { e.preventDefault(); setDragging(false); handleFiles(e.dataTransfer.files); };
  const onDragOver = e => { e.preventDefault(); setDragging(true); };
  const onDragLeave = () => setDragging(false);

  return <div style={{marginBottom:13}}>
    <label style={{display:"block",fontSize:11,color:"var(--text-muted)",marginBottom:5,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase"}}>
      Attachments <span style={{color:"var(--text-muted)",fontWeight:400,textTransform:"none",letterSpacing:0}}>(images, PDFs, Office docs)</span>
    </label>
    <div
      onDrop={onDrop} onDragOver={onDragOver} onDragLeave={onDragLeave}
      onClick={()=>fileRef.current?.click()}
      style={{border:`2px dashed ${dragging?"var(--coral)":"var(--border)"}`,borderRadius:"var(--radius)",padding:"16px",textAlign:"center",cursor:"pointer",background:dragging?"rgba(232,97,74,0.06)":"var(--surface2)",transition:"all 0.15s",marginBottom:attachments.length?10:0}}>
      <Icon d={IC.upload} size={22} color={dragging?"var(--coral)":"var(--text-muted)"}/>
      <div style={{fontSize:12,color:"var(--text-muted)",marginTop:6}}>
        <span style={{color:"var(--coral)",fontWeight:700}}>Click to browse</span> or drag & drop files here
      </div>
      <div style={{fontSize:11,color:"var(--text-muted)",marginTop:3}}>Images · PDF · Word · Excel · PowerPoint</div>
      <input ref={fileRef} type="file" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx" style={{display:"none"}}
        onChange={e=>handleFiles(e.target.files)}/>
    </div>
    {attachments.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:8}}>
      {attachments.map(a=>(
        <div key={a.id} style={{display:"flex",alignItems:"center",gap:7,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"6px 10px",maxWidth:240,position:"relative"}}>
          {isImage(a.name)
            ? <img src={a.dataUrl} alt="" style={{width:32,height:32,objectFit:"cover",borderRadius:4,cursor:"pointer",flexShrink:0}} onClick={()=>setPreviewing(a)}/>
            : <span style={{fontSize:18,flexShrink:0}}>{getFileIcon(a.name)}</span>}
          <div style={{minWidth:0}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:140,cursor:isImage(a.name)?"pointer":"default"}}
              onClick={()=>isImage(a.name)&&setPreviewing(a)}>{a.name}</div>
            <div style={{fontSize:10,color:"var(--text-muted)"}}>{formatSize(a.size)}</div>
          </div>
          <button onClick={()=>onRemove(a.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",padding:"2px",flexShrink:0,lineHeight:1}} title="Remove">
            <Icon d={IC.close} size={13}/>
          </button>
        </div>
      ))}
    </div>}
    {previewing&&<ImagePreview file={previewing} onClose={()=>setPreviewing(null)}/>}
  </div>;
}

function AttachmentList({ attachments=[] }) {
  const [previewing, setPreviewing] = useState(null);
  if(!attachments.length) return null;
  return <div style={{marginBottom:18}}>
    <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
      <Icon d={IC.paperclip} size={12}/> Attachments ({attachments.length})
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
      {attachments.map(a=>(
        <div key={a.id} title={a.name} style={{display:"flex",alignItems:"center",gap:8,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"8px 12px",cursor:"pointer",transition:"border-color 0.15s"}}
          onClick={()=>isImage(a.name)?setPreviewing(a):downloadFile(a)}
          onMouseEnter={e=>e.currentTarget.style.borderColor="var(--coral)"}
          onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
          {isImage(a.name)
            ? <img src={a.dataUrl} alt="" style={{width:40,height:40,objectFit:"cover",borderRadius:4,flexShrink:0}}/>
            : <span style={{fontSize:22,flexShrink:0}}>{getFileIcon(a.name)}</span>}
          <div style={{minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:160}}>{a.name}</div>
            <div style={{fontSize:10,color:"var(--text-muted)"}}>{formatSize(a.size)}</div>
          </div>
          <Icon d={isImage(a.name)?IC.eye:IC.download} size={14} color="var(--text-muted)"/>
        </div>
      ))}
    </div>
    {previewing&&<ImagePreview file={previewing} onClose={()=>setPreviewing(null)}/>}
  </div>;
}

function downloadFile(a) {
  const link = document.createElement("a");
  link.href = a.dataUrl;
  link.download = a.name;
  link.click();
}

function ImagePreview({ file, onClose }) {
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
    <button onClick={onClose} style={{position:"absolute",top:20,right:20,background:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",color:"#fff",display:"flex",alignItems:"center",gap:6,fontSize:13}}>
      <Icon d={IC.close} size={14} color="#fff"/> Close
    </button>
    <div style={{maxWidth:"90vw",maxHeight:"85vh",textAlign:"center"}} onClick={e=>e.stopPropagation()}>
      <img src={file.dataUrl} alt={file.name} style={{maxWidth:"100%",maxHeight:"80vh",borderRadius:"var(--radius)",objectFit:"contain",boxShadow:"0 20px 60px rgba(0,0,0,0.6)"}}/>
      <div style={{color:"rgba(255,255,255,0.6)",fontSize:12,marginTop:10}}>{file.name} · {formatSize(file.size)}</div>
    </div>
  </div>;
}

// ─── Confirm Dialog ──────────────────────────────────────────────────────────
function Confirm({ title, message, onOk, onCancel }) {
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div className="fade-in" style={{background:"var(--surface)",border:"2px solid rgba(248,113,113,0.4)",borderRadius:"var(--radius-lg)",padding:28,maxWidth:420,width:"100%",boxShadow:"var(--shadow)"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
        <div style={{width:38,height:38,borderRadius:"var(--radius-sm)",background:"rgba(248,113,113,0.12)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <Icon d={IC.warn} size={20} color="#F87171"/>
        </div>
        <h3 style={{margin:0,color:"#F87171",fontSize:16,fontWeight:800}}>{title}</h3>
      </div>
      <p style={{margin:"0 0 24px",color:"var(--text-sub)",fontSize:13,lineHeight:1.7}}>{message}</p>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
        <Btn variant="danger" icon="trash" onClick={onOk}>Yes, Delete</Btn>
      </div>
    </div>
  </div>;
}

// ─── Modal ───────────────────────────────────────────────────────────────────
function Modal({ open, onClose, title, wide, children }) {
  if(!open) return null;
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="fade-in" style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"24px 28px",width:"100%",maxWidth:wide?740:500,maxHeight:"92vh",overflowY:"auto",boxShadow:"var(--shadow)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:3,height:20,background:"var(--coral)",borderRadius:2}}/>
          <h2 style={{margin:0,color:"var(--text)",fontSize:17,fontWeight:800}}>{title}</h2>
        </div>
        <button onClick={onClose} style={{background:"var(--surface2)",border:"1px solid var(--border)",cursor:"pointer",color:"var(--text-muted)",padding:"6px",borderRadius:"var(--radius-sm)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Icon d={IC.close} size={16}/>
        </button>
      </div>
      {children}
    </div>
  </div>;
}

// ─── Project Form ─────────────────────────────────────────────────────────────
function ProjectForm({ init, onSave, onClose }) {
  const blank = {name:"",client:"",location:"",contractValue:"",startDate:today(),endDate:"",contactName:"",contactPhone:"",contactEmail:"",notes:""};
  const [f, setF] = useState(init?{...blank,...init}:blank);
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  return <div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"0 16px"}}>
      <Field label="Project Name" value={f.name} onChange={v=>set("name",v)} required placeholder="e.g. Seef Tower A"/>
      <Field label="Client / Contractor" value={f.client} onChange={v=>set("client",v)} required placeholder="Company name"/>
      <Field label="Location" value={f.location} onChange={v=>set("location",v)} placeholder="District, city"/>
      <Field label="Contract Value" value={f.contractValue} onChange={v=>set("contractValue",v)} placeholder="BD 00,000"/>
      <Field label="Start Date" type="date" value={f.startDate} onChange={v=>set("startDate",v)}/>
      <Field label="End Date" type="date" value={f.endDate} onChange={v=>set("endDate",v)}/>
      <Field label="Contact Person" value={f.contactName} onChange={v=>set("contactName",v)}/>
      <Field label="Phone" value={f.contactPhone} onChange={v=>set("contactPhone",v)} placeholder="+973"/>
    </div>
    <Field label="Email" value={f.contactEmail} onChange={v=>set("contactEmail",v)} type="email"/>
    <Field label="Notes / Scope" value={f.notes} onChange={v=>set("notes",v)} rows={2} placeholder="Project scope, special conditions..."/>
    <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:8}}>
      <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
      <Btn onClick={()=>{if(!f.name||!f.client)return;onSave(f);}} icon="check">Save Project</Btn>
    </div>
  </div>;
}

// ─── Snag Form ────────────────────────────────────────────────────────────────
function SnagForm({ init, onSave, onClose }) {
  const blank = {title:"",category:"quality",priority:"medium",status:"open",location:"",brand:"",description:"",reportedBy:"",reportedDate:today(),dueDate:"",amount:"",attachments:[]};
  const [f, setF] = useState(init?{...blank,...init,attachments:init.attachments||[]}:blank);
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const addFile = file => setF(p=>({...p,attachments:[...(p.attachments||[]),file]}));
  const removeFile = id => setF(p=>({...p,attachments:(p.attachments||[]).filter(a=>a.id!==id)}));
  return <div>
    <Field label="Snag Title" value={f.title} onChange={v=>set("title",v)} required placeholder="Short, clear description"/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:"0 12px"}}>
      <Field label="Category" value={f.category} onChange={v=>set("category",v)} options={Object.entries(CATEGORY).map(([v,l])=>({v,l}))}/>
      <Field label="Priority" value={f.priority} onChange={v=>set("priority",v)} options={Object.entries(PRIORITY).map(([v,p])=>({v,l:p.label}))}/>
      <Field label="Status" value={f.status} onChange={v=>set("status",v)} options={Object.entries(STATUS).map(([v,s])=>({v,l:s.label}))}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"0 12px"}}>
      <Field label="Brand / Manufacturer" value={f.brand} onChange={v=>set("brand",v)} placeholder="e.g. Philips, Osram, GE…"/>
      <Field label="Financial Impact" value={f.amount} onChange={v=>set("amount",v)} placeholder="BD 0,000"/>
      <Field label="Site Location / Zone" value={f.location} onChange={v=>set("location",v)} placeholder="Floor / Zone / Area"/>
      <Field label="Reported By" value={f.reportedBy} onChange={v=>set("reportedBy",v)}/>
      <Field label="Reported Date" type="date" value={f.reportedDate} onChange={v=>set("reportedDate",v)}/>
      <Field label="Due Date" type="date" value={f.dueDate} onChange={v=>set("dueDate",v)}/>
    </div>
    <Field label="Description / Details" value={f.description} onChange={v=>set("description",v)} rows={3} placeholder="Full description of the snag, findings, context..."/>
    <FileAttachZone attachments={f.attachments} onAdd={addFile} onRemove={removeFile}/>
    <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:10}}>
      <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
      <Btn onClick={()=>{if(!f.title)return;onSave(f);}} icon="check">Save Snag</Btn>
    </div>
  </div>;
}

// ─── Update Form ──────────────────────────────────────────────────────────────
function UpdateForm({ onSave, onClose, userName }) {
  const [text, setText] = useState("");
  const [by, setBy]     = useState(userName||"");
  const [date, setDate] = useState(today());
  const [attachments, setAttachments] = useState([]);
  const addFile = file => setAttachments(p=>[...p,file]);
  const removeFile = id => setAttachments(p=>p.filter(a=>a.id!==id));
  return <div style={{background:"var(--surface2)",border:"1px solid var(--coral)",borderRadius:"var(--radius)",padding:16,marginBottom:14}} className="fade-in">
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:"0 12px"}}>
      <Field label="Date" type="date" value={date} onChange={setDate}/>
      <Field label="Updated By" value={by} onChange={setBy}/>
    </div>
    <Field label="Update / Action Taken" value={text} onChange={setText} rows={3} placeholder="What happened? Calls, visits, decisions, actions taken..."/>
    <FileAttachZone attachments={attachments} onAdd={addFile} onRemove={removeFile}/>
    <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:4}}>
      <Btn variant="ghost" small onClick={onClose}>Cancel</Btn>
      <Btn small onClick={()=>{if(!text.trim())return;onSave({id:uid(),date,by,text,attachments});}} icon="check">Add Update</Btn>
    </div>
  </div>;
}

// ─── Snag Detail ──────────────────────────────────────────────────────────────
function SnagDetail({ snag, onAddUpdate, onEdit, onDeleteSnag, userName }) {
  const [addingUpd, setAddingUpd] = useState(false);
  const sorted = [...(snag.updates||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const infoItems = [
    ["Category", CATEGORY[snag.category]||snag.category],
    ["Brand", snag.brand||"—"],
    ["Location", snag.location||"—"],
    ["Amount", snag.amount||"—"],
    ["Reported By", snag.reportedBy||"—"],
    ["Reported", fmt(snag.reportedDate)],
    ["Due Date", fmt(snag.dueDate)],
  ];
  const overdue = snag.dueDate&&new Date(snag.dueDate)<new Date()&&!["resolved","closed"].includes(snag.status);
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,marginBottom:18}}>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
          <span style={{fontFamily:"monospace",fontSize:12,color:"var(--coral)",fontWeight:700,background:"rgba(232,97,74,0.12)",padding:"3px 10px",borderRadius:20}}>{snag.ref}</span>
          <Badge status={snag.status}/><PriDot priority={snag.priority}/>
          {overdue&&<span style={{fontSize:11,fontWeight:700,color:"#F87171",background:"rgba(248,113,113,0.1)",padding:"3px 10px",borderRadius:20,border:"1px solid rgba(248,113,113,0.3)"}}>⚠ Overdue</span>}
        </div>
        <h3 style={{margin:0,color:"var(--text)",fontSize:16,fontWeight:800,lineHeight:1.4}}>{snag.title}</h3>
      </div>
      <div style={{display:"flex",gap:6,flexShrink:0}}>
        <button onClick={onEdit} title="Edit" style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"7px 10px",cursor:"pointer",color:"var(--text-sub)",display:"flex"}}>
          <Icon d={IC.edit} size={14}/>
        </button>
        <button onClick={onDeleteSnag} title="Delete" style={{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:"var(--radius-sm)",padding:"7px 10px",cursor:"pointer",color:"#F87171",display:"flex"}}>
          <Icon d={IC.trash} size={14}/>
        </button>
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8,marginBottom:18}}>
      {infoItems.map(([k,v])=>(
        <div key={k} style={{background:"var(--surface2)",borderRadius:"var(--radius-sm)",padding:"9px 12px",border:"1px solid var(--border)"}}>
          <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3}}>{k}</div>
          <div style={{fontSize:12,color:k==="Amount"?"#34D399":k==="Brand"?"var(--coral)":"var(--text)",fontWeight:600}}>{v}</div>
        </div>
      ))}
    </div>

    {snag.description&&<div style={{background:"var(--surface2)",borderRadius:"var(--radius-sm)",padding:"14px",border:"1px solid var(--border)",marginBottom:18}}>
      <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Description</div>
      <p style={{margin:0,color:"var(--text-sub)",fontSize:13,lineHeight:1.7}}>{snag.description}</p>
    </div>}

    {snag.attachments&&snag.attachments.length>0&&<AttachmentList attachments={snag.attachments}/>}

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontSize:11,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",display:"flex",alignItems:"center",gap:6}}>
        <Icon d={IC.grid} size={12}/> Activity ({sorted.length})
      </div>
      <Btn small variant="secondary" icon="plus" onClick={()=>setAddingUpd(true)}>Add Update</Btn>
    </div>

    {addingUpd&&<UpdateForm userName={userName} onSave={upd=>{onAddUpdate(upd);setAddingUpd(false);}} onClose={()=>setAddingUpd(false)}/>}
    {sorted.length===0&&!addingUpd&&<div style={{textAlign:"center",color:"var(--text-muted)",fontSize:13,padding:"20px 0"}}>No updates yet.</div>}
    {sorted.map((upd,i)=>(
      <div key={upd.id} style={{display:"flex",gap:12,marginBottom:14}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
          <div style={{width:9,height:9,borderRadius:"50%",background:"var(--coral)",flexShrink:0,marginTop:5}}/>
          {i<sorted.length-1&&<div style={{width:1,flex:1,background:"var(--border)",marginTop:3}}/>}
        </div>
        <div style={{background:"var(--surface2)",borderRadius:"var(--radius-sm)",padding:"12px 14px",flex:1,border:"1px solid var(--border)"}}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
            <span style={{fontSize:11,fontFamily:"monospace",color:"var(--coral)",fontWeight:700}}>{fmt(upd.date)}</span>
            <span style={{fontSize:11,color:"var(--text-muted)"}}>by <strong style={{color:"var(--coral-light)"}}>{upd.by}</strong></span>
          </div>
          <p style={{margin:0,fontSize:13,color:"var(--text-sub)",lineHeight:1.6}}>{upd.text}</p>
          {upd.attachments&&upd.attachments.length>0&&<div style={{marginTop:10}}><AttachmentList attachments={upd.attachments}/></div>}
        </div>
      </div>
    ))}
  </div>;
}

      <div style={{width:64,height:64,background:"var(--coral)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",boxShadow:"0 8px 24px rgba(232,97,74,0.35)"}}>

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [userName, setUserName]   = useState(()=>sessionStorage.getItem("lx-user")||"");
  const [theme, setTheme]         = useState(()=>localStorage.getItem("lx-theme")||"dark");
  const [db, setDb]               = useState(null);
  const [loading, setLoading]     = useState(true);
  const [syncing, setSyncing]     = useState(false);
  const [lastSync, setLastSync]   = useState(null);
  const [projId, setProjId]       = useState(null);
  const [snagId, setSnagId]       = useState(null);
  const [filterSt, setFilterSt]   = useState("all");
  const [filterPr, setFilterPr]   = useState("all");
  const [filterBrand, setFilterBrand] = useState("all");
  const [search, setSearch]       = useState("");
  const [mAddProj, setMAddProj]   = useState(false);
  const [mEditProj, setMEditProj] = useState(false);
  const [mAddSnag, setMAddSnag]   = useState(false);
  const [mEditSnag, setMEditSnag] = useState(false);
  const [mSnagDet, setMSnagDet]   = useState(false);
  const [conf, setConf]           = useState(null);
  const pollRef = useRef(null);

  useEffect(()=>{
    document.documentElement.setAttribute("data-theme", theme);
    document.body.setAttribute("data-theme", theme);
    localStorage.setItem("lx-theme", theme);
  },[theme]);

  const savingRef = useRef(false);

  const fetchDB = async () => {
    if(savingRef.current) return;
    const d = await fbGet();
    if(savingRef.current) return;
    const init = d || SAMPLE;
    setDb(init);
    setLastSync(new Date());
    setLoading(false);
  };
  useEffect(()=>{
    if(!userName)return;
    fetchDB();
    pollRef.current = setInterval(fetchDB, 10000);
    return ()=>clearInterval(pollRef.current);
  },[userName]);

  const save = async (next) => {
    savingRef.current = true;
    setSyncing(true);
    setDb(next);
    await fbSet(next);
    setLastSync(new Date());
    setSyncing(false);
    // Wait 5 s after write before allowing polls to overwrite local state
    setTimeout(() => { savingRef.current = false; }, 5000);
  };

  const handleEnter = name => { sessionStorage.setItem("lx-user", name); setUserName(name); };

  if(!userName) return <NameGate onEnter={handleEnter}/>;
  if(loading) return <div style={{height:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14}}>
    <div style={{width:40,height:40,border:"3px solid var(--border)",borderTop:`3px solid var(--coral)`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    <span style={{fontSize:13,color:"var(--text-muted)"}}>Loading shared data…</span>
  </div>;

  const proj   = db.projects.find(p=>p.id===projId)||null;
  const snag   = snagId&&proj?proj.snags.find(s=>s.id===snagId):null;
  const stats  = proj?{
    total:proj.snags.length,
    open:proj.snags.filter(s=>s.status==="open").length,
    inProgress:proj.snags.filter(s=>s.status==="in-progress").length,
    resolved:proj.snags.filter(s=>["resolved","closed"].includes(s.status)).length,
    pending:proj.snags.filter(s=>s.status==="pending").length,
  }:{};

  const allBrands = proj ? [...new Set(proj.snags.map(s=>s.brand).filter(Boolean))].sort() : [];

  const filtered = (proj?.snags||[]).filter(s=>{
    if(filterSt!=="all"&&s.status!==filterSt)return false;
    if(filterPr!=="all"&&s.priority!==filterPr)return false;
    if(filterBrand!=="all"&&s.brand!==filterBrand)return false;
    if(search){
      const q=search.toLowerCase();
      if(!s.title.toLowerCase().includes(q)&&!(s.ref||"").toLowerCase().includes(q)&&!(s.brand||"").toLowerCase().includes(q)&&!(s.description||"").toLowerCase().includes(q))return false;
    }
    return true;
  }).sort((a,b)=>["critical","high","medium","low"].indexOf(a.priority)-["critical","high","medium","low"].indexOf(b.priority));

  const nextRef = () => {
    const nums=(proj?.snags||[]).map(s=>parseInt(s.ref?.replace("SNL-","")||0)).filter(Boolean);
    return `SNL-${String((nums.length?Math.max(...nums):0)+1).padStart(3,"0")}`;
  };

  const doAddProject  = f=>{const next={...db,projects:[...db.projects,{...f,id:uid(),snags:[]}]};save(next);setProjId(next.projects.at(-1).id);setMAddProj(false);};
  const doEditProject = f=>{save({...db,projects:db.projects.map(p=>p.id===projId?{...p,...f}:p)});setMEditProj(false);};
  const doDeleteProject = ()=>setConf({title:"Delete Project",msg:`Delete "${proj.name}" and ALL its snags? This cannot be undone.`,action:()=>{const next={...db,projects:db.projects.filter(p=>p.id!==projId)};save(next);setProjId(next.projects[0]?.id||null);setConf(null);}});
  const doAddSnag     = f=>{save({...db,projects:db.projects.map(p=>p.id===projId?{...p,snags:[...p.snags,{...f,id:uid(),ref:nextRef(),updates:[],attachments:f.attachments||[]}]}:p)});setMAddSnag(false);};
  const doEditSnag    = f=>{save({...db,projects:db.projects.map(p=>p.id===projId?{...p,snags:p.snags.map(s=>s.id===snagId?{...s,...f}:s)}:p)});setMEditSnag(false);};
  const doDeleteSnag  = ()=>setConf({title:"Delete Snag",msg:`Delete "${snag?.ref} — ${snag?.title}"? This cannot be undone.`,action:()=>{save({...db,projects:db.projects.map(p=>p.id===projId?{...p,snags:p.snags.filter(s=>s.id!==snagId)}:p)});setSnagId(null);setMSnagDet(false);setConf(null);}});
  const doAddUpdate   = upd=>save({...db,projects:db.projects.map(p=>p.id===projId?{...p,snags:p.snags.map(s=>s.id===snagId?{...s,updates:[...(s.updates||[]),upd]}:s)}:p)});

  const selectProj = id => { setProjId(id); setFilterSt("all"); setFilterPr("all"); setFilterBrand("all"); setSearch(""); };

  return (
    <div style={{height:"100vh",background:"var(--bg)",fontFamily:"'Inter',system-ui,sans-serif",color:"var(--text)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <style>{`
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .fade-in{animation:fadeIn 0.2s ease both;}
        .snag-card{transition:all 0.15s;}
        .snag-card:hover{border-color:var(--coral)!important;transform:translateY(-1px);box-shadow:0 4px 20px rgba(232,97,74,0.1);}
        input,select,textarea{transition:border-color 0.15s;}
        .proj-item{transition:all 0.15s;}
        .proj-item:hover{background:rgba(232,97,74,0.06)!important;}
        @media(max-width:720px){
          .sidebar-wrap{width:200px!important;}
          .hide-mobile{display:none!important;}
        }
        @media(max-width:480px){
          .sidebar-wrap{display:none!important;}
        }
      `}</style>

      {conf&&<Confirm title={conf.title} message={conf.msg} onOk={conf.action} onCancel={()=>setConf(null)}/>}
      <Modal open={mAddProj}  onClose={()=>setMAddProj(false)}  title="New Project" wide><ProjectForm onSave={doAddProject} onClose={()=>setMAddProj(false)}/></Modal>
      <Modal open={mEditProj} onClose={()=>setMEditProj(false)} title="Edit Project" wide>{proj&&<ProjectForm init={proj} onSave={doEditProject} onClose={()=>setMEditProj(false)}/>}</Modal>
      <Modal open={mAddSnag}  onClose={()=>setMAddSnag(false)}  title="New Snag" wide><SnagForm onSave={doAddSnag} onClose={()=>setMAddSnag(false)}/></Modal>
      <Modal open={mEditSnag} onClose={()=>setMEditSnag(false)} title="Edit Snag" wide>{snag&&<SnagForm init={snag} onSave={doEditSnag} onClose={()=>setMEditSnag(false)}/>}</Modal>
      <Modal open={mSnagDet}  onClose={()=>{setMSnagDet(false);}} title={snag?.ref||"Snag Detail"} wide>
        {snag&&<SnagDetail snag={snag} userName={userName} onAddUpdate={doAddUpdate} onEdit={()=>{setMSnagDet(false);setMEditSnag(true);}} onDeleteSnag={doDeleteSnag}/>}
      </Modal>

      {/* ── Top Bar ── */}
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"11px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0,zIndex:100}}>

        {/* Logo */}
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div>
            <div style={{display:"flex",alignItems:"baseline",gap:1}}>
              <span style={{fontSize:15,fontWeight:900,letterSpacing:"-0.5px",color:"var(--text)"}}>light</span>
              <span style={{fontSize:15,fontWeight:900,letterSpacing:"-0.5px",color:"var(--coral)"}}>ex</span>
            </div>
            <div style={{fontSize:9,color:"var(--text-muted)",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>Snag Management</div>
          </div>
        </div>

        {/* Sync indicator */}
        <div style={{display:"flex",alignItems:"center",gap:5,marginLeft:4}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:syncing?"var(--coral)":"#34D399",flexShrink:0,animation:syncing?"pulse 1s infinite":""}}/>
          <span className="hide-mobile" style={{fontSize:11,color:"var(--text-muted)"}}>{syncing?"Saving…":lastSync?`Synced ${lastSync.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}`:""}</span>
        </div>

        <div style={{flex:1}}/>

        {/* User */}
        <div className="hide-mobile" style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"var(--text-muted)"}}>
          <Icon d={IC.users} size={13}/>
          <span style={{color:"var(--coral)",fontWeight:700}}>{userName}</span>
        </div>

        {/* Theme toggle */}
        <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} title="Toggle theme"
          style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"7px",cursor:"pointer",color:"var(--text-muted)",display:"flex",alignItems:"center",flexShrink:0}}>
          <Icon d={theme==="dark"?IC.sun:IC.moon} size={15}/>
        </button>

        <Btn small icon="plus" onClick={()=>setMAddProj(true)}>New Project</Btn>
      </div>

      {/* ── Body ── */}
      <div style={{display:"flex",flex:1,minHeight:0,overflow:"hidden"}} className="main-layout">

        {/* Sidebar */}
        <div className="sidebar-wrap" style={{width:248,background:"var(--surface)",borderRight:"1px solid var(--border)",overflowY:"auto",flexShrink:0,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"14px 12px 6px",fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.09em",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span>Projects ({db.projects.length})</span>
          </div>
          {db.projects.length===0&&<div style={{padding:"20px 14px",color:"var(--text-muted)",fontSize:12}}>No projects yet.</div>}
          {db.projects.map(p=>{
            const openCount=p.snags.filter(s=>!["resolved","closed"].includes(s.status)).length;
            const active=p.id===projId;
            return <div key={p.id} className="proj-item" onClick={()=>selectProj(p.id)}
              style={{padding:"11px 14px",cursor:"pointer",borderRadius:"var(--radius)",margin:"2px 7px",background:active?"rgba(232,97,74,0.1)":"transparent",borderLeft:active?"3px solid var(--coral)":"3px solid transparent",position:"relative"}}>
              <div style={{fontSize:13,fontWeight:700,color:active?"var(--text)":"var(--text-sub)",marginBottom:2,lineHeight:1.3}}>{p.name}</div>
              <div style={{fontSize:11,color:"var(--text-muted)"}}>{p.client}</div>
              {openCount>0&&<div style={{display:"inline-block",marginTop:5,fontSize:10,fontWeight:700,color:"var(--coral)",background:"rgba(232,97,74,0.12)",padding:"2px 8px",borderRadius:20}}>{openCount} open</div>}
            </div>;
          })}
        </div>

        {/* Main Content */}
        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",minWidth:0}}>
          {!proj
            ? <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,color:"var(--text-muted)"}}>
                <div style={{width:56,height:56,background:"rgba(232,97,74,0.1)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <Icon d={IC.building} size={24} color="var(--coral)"/>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:15,fontWeight:700,color:"var(--text-sub)",marginBottom:6}}>No project selected</div>
                  <div style={{fontSize:13}}>Choose a project from the sidebar or create a new one.</div>
                </div>
                <Btn icon="plus" onClick={()=>setMAddProj(true)}>Create Project</Btn>
              </div>
            : <>
              {/* Project Header */}
              <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"18px 22px",flexShrink:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}} className="project-header-meta">
                  <div style={{flex:1,minWidth:0}}>
                    <h1 style={{margin:"0 0 6px",fontSize:19,fontWeight:900,color:"var(--text)",letterSpacing:"-0.3px"}}>{proj.name}</h1>
                    <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
                      {[["Client",proj.client],["Location",proj.location],["Value",proj.contractValue],["Contact",proj.contactName]].filter(([,v])=>v).map(([k,v])=>(
                        <div key={k} style={{fontSize:12,color:"var(--text-muted)"}}><span style={{fontWeight:700,color:"var(--text-sub)"}}>{k}:</span> {v}</div>
                      ))}
                    </div>
                    {proj.notes&&<div style={{marginTop:5,fontSize:12,color:"var(--coral)",fontStyle:"italic",opacity:0.8}}>{proj.notes}</div>}
                  </div>
                  <div style={{display:"flex",gap:7,flexShrink:0}}>
                    <Btn small variant="ghost" icon="edit" onClick={()=>setMEditProj(true)}>Edit</Btn>
                    <Btn small variant="danger" icon="trash" onClick={doDeleteProject}>Delete</Btn>
                  </div>
                </div>

                {/* Stats */}
                <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}} className="stats-row">
                  {[
                    ["Total",    stats.total,      "var(--text)"],
                    ["Open",     stats.open,       "var(--status-open-c)"],
                    ["In Prog.", stats.inProgress, "var(--status-ip-c)"],
                    ["Pending",  stats.pending,    "var(--status-pend-c)"],
                    ["Resolved", stats.resolved,   "var(--status-res-c)"],
                  ].map(([l,v,c])=>(
                    <div key={l} className="stat-card" style={{background:"var(--surface2)",border:`1px solid ${c}30`,borderRadius:"var(--radius)",padding:"10px 16px",minWidth:72,textAlign:"center"}}>
                      <div className="stat-val" style={{fontSize:20,fontWeight:900,color:c,fontFamily:"monospace"}}>{v}</div>
                      <div style={{fontSize:10,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:700,marginTop:1}}>{l}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Filter Bar */}
              <div style={{padding:"12px 22px",borderBottom:"1px solid var(--border)",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",flexShrink:0,background:"var(--surface)"}} className="filter-bar">
                <div style={{position:"relative",flex:"1 1 160px",minWidth:120}}>
                  <div style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}>
                    <Icon d={IC.search} size={13} color="var(--text-muted)"/>
                  </div>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search snags, brand, ref…"
                    style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"8px 12px 8px 30px",color:"var(--text)",fontSize:12,outline:"none",fontFamily:"inherit",width:"100%"}}/>
                </div>
                {[
                  ["All Status",...Object.entries(STATUS).map(([v,s])=>[v,s.label])],
                ].map(([ph,...opts])=>(
                  <select key={ph} value={filterSt} onChange={e=>setFilterSt(e.target.value)}
                    style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"8px 11px",color:"var(--text)",fontSize:12,outline:"none",fontFamily:"inherit"}}>
                    <option value="all">{ph}</option>
                    {opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                  </select>
                ))}
                <select value={filterPr} onChange={e=>setFilterPr(e.target.value)}
                  style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"8px 11px",color:"var(--text)",fontSize:12,outline:"none",fontFamily:"inherit"}}>
                  <option value="all">All Priority</option>
                  {Object.entries(PRIORITY).map(([v,p])=><option key={v} value={v}>{p.label}</option>)}
                </select>
                {allBrands.length>0&&<select value={filterBrand} onChange={e=>setFilterBrand(e.target.value)}
                  style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"8px 11px",color:"var(--text)",fontSize:12,outline:"none",fontFamily:"inherit"}}>
                  <option value="all">All Brands</option>
                  {allBrands.map(b=><option key={b} value={b}>{b}</option>)}
                </select>}
                <Btn small icon="plus" onClick={()=>setMAddSnag(true)}>Add Snag</Btn>
              </div>

              {/* Snag List */}
              <div style={{padding:"16px 22px",flex:1}}>
                {filtered.length===0&&<div style={{textAlign:"center",color:"var(--text-muted)",padding:"50px 0",fontSize:14}}>
                  <div style={{marginBottom:8,fontSize:28}}>{proj.snags.length===0?"📋":"🔍"}</div>
                  {proj.snags.length===0?"No snags yet — click 'Add Snag' to begin.":"No results match your filters."}
                </div>}
                {filtered.map(s=>{
                  const priColor = PRIORITY[s.priority]?.color||"var(--text-muted)";
                  const attCount = (s.attachments||[]).length;
                  const overdue  = s.dueDate&&new Date(s.dueDate)<new Date()&&!["resolved","closed"].includes(s.status);
                  return <div key={s.id} className="snag-card fade-in" onClick={()=>{setSnagId(s.id);setMSnagDet(true);}}
                    style={{background:"var(--surface)",border:`1px solid var(--border)`,borderRadius:"var(--radius)",padding:"14px 18px",marginBottom:9,cursor:"pointer",borderLeft:`4px solid ${priColor}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:6,flexWrap:"wrap"}} className="snag-card-meta">
                          <span style={{fontFamily:"monospace",fontSize:11,color:"var(--coral)",fontWeight:700,background:"rgba(232,97,74,0.1)",padding:"2px 8px",borderRadius:20}}>{s.ref}</span>
                          <Badge status={s.status}/>
                          <PriDot priority={s.priority}/>
                          {s.category&&<span style={{fontSize:11,color:"var(--text-muted)",background:"var(--surface2)",border:"1px solid var(--border)",padding:"2px 8px",borderRadius:20}}>{CATEGORY[s.category]}</span>}
                          {s.brand&&<span style={{fontSize:11,color:"var(--coral-light)",background:"rgba(232,97,74,0.08)",border:"1px solid rgba(232,97,74,0.2)",padding:"2px 8px",borderRadius:20,display:"flex",alignItems:"center",gap:4}}>
                            <Icon d={IC.brand} size={10} color="var(--coral-light)"/>{s.brand}
                          </span>}
                        </div>
                        <div style={{fontSize:14,fontWeight:800,color:"var(--text)",marginBottom:5,lineHeight:1.3}}>{s.title}</div>
                        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                          {s.location&&<span style={{fontSize:11,color:"var(--text-muted)"}}>📍 {s.location}</span>}
                          {s.reportedDate&&<span style={{fontSize:11,color:"var(--text-muted)"}}>📅 {fmt(s.reportedDate)}</span>}
                          {s.amount&&<span style={{fontSize:11,color:"#34D399",fontWeight:700}}>💰 {s.amount}</span>}
                          {s.dueDate&&<span style={{fontSize:11,color:overdue?"#F87171":"var(--text-muted)",fontWeight:overdue?700:400}}>
                            {overdue?"⚠":"⏰"} Due {fmt(s.dueDate)}
                          </span>}
                        </div>
                      </div>
                      <div style={{fontSize:11,color:"var(--text-muted)",textAlign:"right",flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                        <div>{(s.updates||[]).length} update{(s.updates||[]).length!==1?"s":""}</div>
                        {attCount>0&&<div style={{display:"flex",alignItems:"center",gap:4,color:"var(--coral)",fontWeight:700}}>
                          <Icon d={IC.paperclip} size={11} color="var(--coral)"/>
                          {attCount} file{attCount!==1?"s":""}
                        </div>}
                        <div style={{color:"var(--coral)",fontSize:10,fontWeight:700}}>View →</div>
                      </div>
                    </div>
                    {s.description&&<p style={{margin:"9px 0 0",fontSize:12,color:"var(--text-muted)",lineHeight:1.5,borderTop:"1px solid var(--border)",paddingTop:8}}>{s.description.length>130?s.description.slice(0,130)+"…":s.description}</p>}
                    {/* Attachment thumbnails preview */}
                    {(s.attachments||[]).filter(a=>isImage(a.name)).length>0&&(
                      <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                        {s.attachments.filter(a=>isImage(a.name)).slice(0,5).map(a=>(
                          <img key={a.id} src={a.dataUrl} alt="" style={{width:38,height:38,objectFit:"cover",borderRadius:5,border:"1px solid var(--border)"}}/>
                        ))}
                        {s.attachments.filter(a=>isImage(a.name)).length>5&&<div style={{width:38,height:38,background:"var(--surface2)",borderRadius:5,border:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"var(--text-muted)",fontWeight:700}}>+{s.attachments.filter(a=>isImage(a.name)).length-5}</div>}
                      </div>
                    )}
                  </div>;
                })}
              </div>
            </>
          }
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
