<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snag List Tracker</title>
<script src="[https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4](https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4)"></script>
<script src="[https://unpkg.com/react@18/umd/react.development.js](https://unpkg.com/react@18/umd/react.development.js)"></script>
<script src="[https://unpkg.com/react-dom@18/umd/react-dom.development.js](https://unpkg.com/react-dom@18/umd/react-dom.development.js)"></script>
<script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
<script src="[https://unpkg.com/lucide@latest](https://unpkg.com/lucide@latest)"></script>
<style>
:root {
--surface: #ffffff;
--border: #e2e8f0;
--text-muted: #64748b;
--pri-crit: #ef4444;
--pri-high: #f97316;
--pri-med: #eab308;
--pri-low: #3b82f6;
--status-res-c: #10b981;
--status-rej-c: #dc2626;
--status-cl-c: #64748b;
}
</style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
​<div id="root"></div>
​<script type="text/babel">
const { useState, useEffect } = React;
​const STATUS = {
open: { label: "Open", color: "text-blue-600", bg: "bg-blue-50" },
resolved: { label: "Resolved", color: "text-emerald-600", bg: "bg-emerald-50" },
rejected: { label: "Rejected", color: "text-red-600", bg: "bg-red-50" },
closed: { label: "Closed", color: "text-slate-600", bg: "bg-slate-50" }
};
​const PRIORITY = {
critical: { label: "Critical", color: "var(--pri-crit)" },
high: { label: "High", color: "var(--pri-high)" },
medium: { label: "Medium", color: "var(--pri-med)" },
low: { label: "Low", color: "var(--pri-low)" }
};
​const CATEGORY = {
delivery: "Delivery Issue",
quality: "Quality Issue",
shortage: "Shortage",
damage: "Damage",
installation: "Installation",
payment: "Payment",
warranty: "Warranty"
};
​const FB_URL = "";
const DB_PATH = "";
const const_uid = () => Math.random().toString(36).slice(2, 9);
const const_today = () => new Date().toISOString().split("T")[0];
const isImage = (name) => ["jpg", "jpeg", "png", "gif", "webp"].includes((name || "").split(".").pop().toLowerCase());
​function App() {
const [snags, setSnags] = useState([]);
const [loading, setLoading] = useState(true);
const [filter, setFilter] = useState("all");
​const fetchData = async () => {
try {
const localData = localStorage.getItem("snagdata");
if (localData) {
setSnags(JSON.parse(localData));
} else {
setSnags([]);
}
} catch (err) {
console.error("Error loading local data", err);
} finally {
setLoading(false);
}
};
​const saveData = async (newData) => {
localStorage.setItem("snagdata", JSON.stringify(newData));
};
​useEffect(() => {
fetchData();
}, []);
​const handleDelete = (id) => {
const updatedSnags = snags.filter(snag => snag.id !== id);
setSnags(updatedSnags);
saveData(updatedSnags);
};
​const handleAddSnag = () => {
const newSnag = {
id: const_uid(),
title: "New Snag Item",
description: "Please edit description",
status: "open",
priority: "medium",
category: "quality",
date: const_today(),
attachments: []
};
const updatedSnags = [newSnag, ...snags];
setSnags(updatedSnags);
saveData(updatedSnags);
};
​if (loading) {
return <div class="flex items-center justify-center h-screen text-slate-500">Loading Dashboard...</div>;
}
​const filteredSnags = snags.filter(s => filter === "all" || s.status === filter);
​return (
<div class="min-h-screen flex flex-col">
<header class="bg-white border-b border-slate-200 p-4 flex items-center justify-between">
<h1 class="text-xl font-bold text-slate-800">Snag List Dashboard</h1>
<button onClick={handleAddSnag} class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium text-sm transition-colors">
+ Add Snag
</button>
</header>
​<main class="flex-1 p-6 max-w-7xl w-full mx-auto">
<div class="mb-6 flex gap-2">
{["all", "open", "resolved", "rejected", "closed"].map(type => (
<button key={type} onClick={() => setFilter(type)} class={px-4 py-2 rounded-lg text-sm font-medium capitalize transition-colors ${filter === type ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'}}>
{type}
</button>
))}
</div>
​{filteredSnags.length === 0 ? (
<div class="bg-white border border-slate-200 rounded-xl p-12 text-center text-slate-500">
No snag items found. Click "+ Add Snag" to create one.
</div>
) : (
<div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
{filteredSnags.map(snag => (
<div key={snag.id} class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow relative">
<button onClick={() => handleDelete(snag.id)} class="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition-colors" title="Delete">
Delete
</button>
<div class="flex items-center gap-2 mb-3">
<span class={px-2.5 py-1 rounded-full text-xs font-semibold ${STATUS[snag.status]?.bg} ${STATUS[snag.status]?.color}}>
{STATUS[snag.status]?.label}
</span>
<span class="text-xs font-medium text-slate-400" style={{color: PRIORITY[snag.priority]?.color}}>
● {PRIORITY[snag.priority]?.label}
</span>
</div>
<h3 class="font-bold text-slate-800 mb-1 pr-12">{snag.title}</h3>
<p class="text-slate-600 text-sm mb-4 line-clamp-2">{snag.description}</p>
<div class="border-t border-slate-100 pt-3 flex items-center justify-between text-xs text-slate-400">
<span>{CATEGORY[snag.category]}</span>
<span>{snag.date}</span>
</div>
</div>
))}
</div>
)}
</main>
</div>
);
}
​ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
