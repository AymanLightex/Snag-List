<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightex Snag Management</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root[data-theme="light"] {
      --background: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-sub: #475569;
      --text-muted: #94a3b8;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --warning: #ea580c;
      --danger: #dc2626;
      --card-shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.02);
    }
    :root[data-theme="dark"] {
      --background: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f8fafc;
      --text-sub: #94a3b8;
      --text-muted: #64748b;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #22c55e;
      --warning: #f97316;
      --danger: #ef4444;
      --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.2), 0 2px 4px -1px rgba(0,0,0,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: var(--background); color: var(--text); transition: background 0.2s, color 0.2s; -webkit-font-smoothing: antialiased; }
    .app-container { display: flex; flex-direction: column; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function Login({ onEnter }) {
      const [name, setName] = useState("");
      return (
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", minHeight: "100vh", background: "var(--background)" }}>
          <div style={{ background: "var(--surface)", padding: 32, borderRadius: 12, border: "1px solid var(--border)", width: "100%", maxWidth: 400, textAlign: "center" }}>
            <h2 style={{ marginBottom: 16 }}>Welcome to Lightex</h2>
            <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Enter your name" style={{ width: "100%", padding: 12, borderRadius: 6, border: "1px solid var(--border)", marginBottom: 16 }} />
            <button onClick={() => name.trim() && onEnter(name.trim())} style={{ width: "100%", padding: 12, background: "var(--primary)", color: "#fff", border: "none", borderRadius: 6, fontWeight: "bold", cursor: "pointer" }}>Enter</button>
          </div>
        </div>
      );
    }

    function Layout({ userName, theme, setTheme }) {
      return (
        <div className="app-container">
          <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 24px", background: "var(--surface)", borderBottom: "1px solid var(--border)" }}>
            <div>
              <span style={{ fontSize: 20, fontWeight: "bold" }}>lightex</span>
              <span style={{ fontSize: 12, color: "var(--text-muted)", marginLeft: 8 }}>SNAG MANAGEMENT</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
              <span>Hi, {userName}</span>
              <button onClick={() => setTheme(theme === "light" ? "dark" : "light")} style={{ padding: "6px 12px", borderRadius: 6, border: "1px solid var(--border)", cursor: "pointer" }}>
                {theme === "light" ? "🌙 Dark" : "☀️ Light"}
              </button>
            </div>
          </header>
          <main style={{ padding: 24, flex: 1 }}>
            <h3>PROJECTS (0)</h3>
            <p style={{ color: "var(--text-muted)", marginTop: 16 }}>No projects yet.</p>
          </main>
        </div>
      );
    }

    function App() {
      const [userName, setUserName] = useState(() => localStorage.getItem("lx-user") || "");
      const [theme, setTheme] = useState(() => localStorage.getItem("lx-theme") || "light");
      const [db, setDb] = useState(() => {
        const saved = localStorage.getItem("snagdata");
        return saved ? JSON.parse(saved) : { projects: [] };
      });

      useEffect(() => {
        localStorage.setItem("lx-user", userName);
      }, [userName]);

      // كود الحفظ التلقائي الفوري السليم والمضمون
      useEffect(() => {
        if (db) {
          localStorage.setItem("snagdata", JSON.stringify(db));
        }
      }, [db]);

      useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("lx-theme", theme);
      }, [theme]);

      if (!userName) {
        return <Login onEnter={setUserName} />;
      }

      return (
        <Layout userName={userName} theme={theme} setTheme={setTheme} />
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
